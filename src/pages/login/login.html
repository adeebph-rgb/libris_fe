<div class="login-page">
  <div class="login-card">
    <div class="logo-area">
      <svg class="brand-logo-large-svg" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
        <path stroke-linecap="round" stroke-linejoin="round" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253" />
      </svg>
      <h1 class="app-name">Libris</h1>
      <p class="app-tagline">Your personal library companion</p>
    </div>

    @if (errorMsg()) {
      <div class="error-banner">
        {{ errorMsg() }}
      </div>
    }

    @if (successMsg()) {
      <div class="success-banner">
        {{ successMsg() }}
      </div>
    }

    @if (isLoginMode()) {
      <form [formGroup]="loginForm" (ngSubmit)="onLogin()" class="auth-form">

        <div class="form-group">
          <label>Username</label>
          <input type="text" formControlName="name" placeholder="Enter you username" />
        </div>

        <div class="form-group">
          <label>Password</label>
          <div class="password-wrapper">
            <input [type]="showLoginPassword() ? 'text' : 'password'" formControlName="password" placeholder="••••••••" />
            <button type="button" class="password-toggle-btn" (click)="showLoginPassword.set(!showLoginPassword())" aria-label="Toggle password visibility">
              @if (showLoginPassword()) {
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="eye-icon">
                  <path stroke-linecap="round" stroke-linejoin="round" d="M3.98 8.223A10.477 10.477 0 0 0 1.934 12C3.226 16.338 7.244 19.5 12 19.5c.993 0 1.953-.138 2.863-.395M6.228 6.228A10.451 10.451 0 0 1 12 4.5c4.756 0 8.773 3.162 10.065 7.498a10.522 10.522 0 0 1-4.293 5.774M6.228 6.228 3 3m3.228 3.228 3.65 3.65m7.894 7.894L21 21m-3.228-3.228-3.65-3.65m0 0a3 3 0 1 0-4.243-4.243m4.242 4.242L9.88 9.88" />
                </svg>
              } @else {
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="eye-icon">
                  <path stroke-linecap="round" stroke-linejoin="round" d="M2.036 12.322a1.012 1.012 0 0 1 0-.639C3.423 7.51 7.36 4.5 12 4.5c4.638 0 8.573 3.007 9.963 7.178.07.207.07.431 0 .639C20.577 16.49 16.64 19.5 12 19.5c-4.638 0-8.573-3.007-9.963-7.178Z" />
                  <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 1 1-6 0 3 3 0 0 1 6 0Z" />
                </svg>
              }
            </button>
          </div>
        </div>

        <button type="submit" [disabled]="loginForm.invalid" class="btn-submit">
          Sign In
        </button>

        <p class="toggle-text">
          Don't have an account?
          <span (click)="toggleMode()">Sign Up</span>
        </p>
      </form>
    } @else {
      <form [formGroup]="signupForm" (ngSubmit)="onSignup()" class="auth-form">
        <h2 class="form-title">Create Account</h2>

        <div class="form-group">
          <label>username</label>
          <input type="text" formControlName="name" placeholder="Enter your username" />
        </div>

        <div class="form-group">
          <label>Email Address</label>
          <input type="email" formControlName="email" placeholder="Enter your email" />
        </div>

        <div class="form-group">
          <label>Password</label>
          <div class="password-wrapper">
            <input [type]="showSignupPassword() ? 'text' : 'password'" formControlName="password" placeholder="••••••••" />
            <button type="button" class="password-toggle-btn" (click)="showSignupPassword.set(!showSignupPassword())" aria-label="Toggle password visibility">
              @if (showSignupPassword()) {
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="eye-icon">
                  <path stroke-linecap="round" stroke-linejoin="round" d="M3.98 8.223A10.477 10.477 0 0 0 1.934 12C3.226 16.338 7.244 19.5 12 19.5c.993 0 1.953-.138 2.863-.395M6.228 6.228A10.451 10.451 0 0 1 12 4.5c4.756 0 8.773 3.162 10.065 7.498a10.522 10.522 0 0 1-4.293 5.774M6.228 6.228 3 3m3.228 3.228 3.65 3.65m7.894 7.894L21 21m-3.228-3.228-3.65-3.65m0 0a3 3 0 1 0-4.243-4.243m4.242 4.242L9.88 9.88" />
                </svg>
              } @else {
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="eye-icon">
                  <path stroke-linecap="round" stroke-linejoin="round" d="M2.036 12.322a1.012 1.012 0 0 1 0-.639C3.423 7.51 7.36 4.5 12 4.5c4.638 0 8.573 3.007 9.963 7.178.07.207.07.431 0 .639C20.577 16.49 16.64 19.5 12 19.5c-4.638 0-8.573-3.007-9.963-7.178Z" />
                  <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 1 1-6 0 3 3 0 0 1 6 0Z" />
                </svg>
              }
            </button>
          </div>
        </div>

        <button type="submit" [disabled]="signupForm.invalid" class="btn-submit">
          Get Started
        </button>

        <p class="toggle-text">
          Already have an account?
          <span (click)="toggleMode()">Sign In</span>
        </p>
      </form>
    }
  </div>
</div>
